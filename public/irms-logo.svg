<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 350" width="650" height="350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');
    </style>
  </defs>

  <!-- Arc jaune -->
  <path
    d="M 335,60 A 145,145 0 1,0 320,290"
    fill="none"
    stroke="#FFD600"
    stroke-width="16"
    stroke-linecap="round"
  />

  <!-- IRMS : Violet très foncé -->
  <text
    x="160" y="230"
    text-anchor="start"
    font-family="Nunito, 'Arial Rounded MT Bold', Arial, sans-serif"
    font-weight="900"
    font-size="165"
    fill="#2A004E"
  >IRMS</text>

  <!-- DGRK : Aligné sous la partie droite de IRMS -->
  <text
    x="330" y="285"
    text-anchor="start"
    font-family="Nunito, 'Arial Rounded MT Bold', Arial, sans-serif"
    font-weight="800"
    font-size="44"
    letter-spacing="4"
    fill="#2A004E"
  >DGRK</text>

</svg>
